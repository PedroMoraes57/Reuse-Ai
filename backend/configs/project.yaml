project:
  name: Reuse.AI
  locale: pt-BR

paths:
  dataset_root: data/datasets/recycle30
  raw_dataset_root: data/datasets/recycle30/raw
  checkpoint_dir: artifacts/checkpoints
  checkpoint_path: artifacts/checkpoints/reuse_ai_best.pt
  report_dir: artifacts/reports
  class_catalog: configs/class_catalog.yaml
  disposal_rules: configs/disposal_rules.yaml

dataset:
  split:
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15
    seed: 42

model:
  name: convnext_tiny.fb_in22k_ft_in1k
  pretrained: true
  image_size: 224
  dropout: 0.2

training:
  epochs: 30
  batch_size: 16
  learning_rate: 0.00018
  warmup_epochs: 4
  lr_warmup_start_factor: 0.2
  min_learning_rate: 0.000005
  weight_decay: 0.0001
  num_workers: 8
  mixed_precision: true
  grad_clip_norm: 1.0
  patience: 8
  label_smoothing: 0.08
  prefer_cuda: true
  require_cuda: true
  use_model_ema: true
  model_ema_decay: 0.9995
  balanced_sampling: true
  use_class_weights: false
  mixup_alpha: 0.35
  cutmix_alpha: 0.8
  mixup_prob: 0.75
  mixup_switch_prob: 0.5
  randaugment_layers: 2
  randaugment_magnitude: 7
  grayscale_prob: 0.08
  perspective_prob: 0.2
  affine_prob: 0.35
  blur_prob: 0.12
  autocontrast_prob: 0.1
  random_erasing_prob: 0.18

inference:
  top_k: 3
  confidence_threshold: 0.6
  margin_threshold: 0.18
  entropy_threshold: 0.55
  min_consensus: 0.6
  temperature: 1.15
  tta_horizontal_flip: true
  calibrate_temperature: true
  calibrate_thresholds: true
  target_min_coverage: 0.55
  target_min_accepted_accuracy: 0.92
  max_wrong_accept_rate: 0.05
  target_min_class_precision: 0.88
  class_threshold_min_support: 20
  class_threshold_min_keep_ratio: 0.35
  class_threshold_min_gain: 0.03
  use_embedding_prototypes: true
  use_full_frame_view: true
  use_focus_crops: true
  focus_crop_ratio: 0.82
  focus_crop_aspect_threshold: 1.3
  reject_on_prototype_disagreement: true
  prototype_similarity_threshold: -1.0
  prototype_threshold_min_support: 20
  prototype_threshold_min_keep_ratio: 0.35
  prototype_threshold_min_gain: 0.02

location:
  geocoder_user_agent: reuse-ai-backend
  geocoder_timeout_seconds: 5
